name: Helm setup
description: Install helm and configure Docker for OCI registry access

runs:
  using: composite
  steps:
    - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

    - name: Configure Docker for OCI
      shell: bash
      run: |
        if [ ! -f ~/.docker/config.json ]; then
          mkdir -p ~/.docker && echo '{}' > ~/.docker/config.json
        fi
