name: CI
on:
  pull_request:

jobs:
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Cache helm repository index
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/helm
          key: helm-${{ hashFiles('charts/**/Chart.yaml', 'charts/**/Chart.lock') }}
          restore-keys: helm-

      - name: Add helm repos
        run: |
          python3 -c "
          import yaml, glob
          repos = set()
          for f in glob.glob('charts/**/Chart.yaml', recursive=True):
              with open(f) as fh:
                  data = yaml.safe_load(fh)
              for dep in (data or {}).get('dependencies', []):
                  repo = dep.get('repository', '')
                  if repo and not repo.startswith('oci://'):
                      repos.add(repo)
          for i, repo in enumerate(sorted(repos)):
              print(f'helm repo add repo-{i} {repo}')
          " | bash
          helm repo update
          mkdir -p ~/.docker && echo '{}' > ~/.docker/config.json

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/

      - name: Lint and validate charts
        run: |
          set -e
          for chart in charts/*/*; do
            [ -f "$chart/Chart.yaml" ] || continue
            echo "--- $chart ---"
            helm dependency build "$chart"
            helm lint "$chart"
            helm template release "$chart" \
              | kubeconform -strict \
                  -kubernetes-version 1.36.0 \
                  -schema-location default \
                  -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
                  -skip CustomResourceDefinition \
                  -summary
          done

  kube-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Cache helm repository index
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/helm
          key: helm-${{ hashFiles('charts/**/Chart.yaml', 'charts/**/Chart.lock') }}
          restore-keys: helm-

      - name: Add helm repos
        run: |
          python3 -c "
          import yaml, glob
          repos = set()
          for f in glob.glob('charts/**/Chart.yaml', recursive=True):
              with open(f) as fh:
                  data = yaml.safe_load(fh)
              for dep in (data or {}).get('dependencies', []):
                  repo = dep.get('repository', '')
                  if repo and not repo.startswith('oci://'):
                      repos.add(repo)
          for i, repo in enumerate(sorted(repos)):
              print(f'helm repo add repo-{i} {repo}')
          " | bash
          helm repo update
          mkdir -p ~/.docker && echo '{}' > ~/.docker/config.json

      - name: Install kube-linter
        run: |
          curl -sL https://github.com/stackrox/kube-linter/releases/latest/download/kube-linter-linux.tar.gz \
            | tar xz -C /tmp
          sudo mv /tmp/kube-linter /usr/local/bin/

      - name: Kube-lint charts
        run: |
          for chart in charts/*/*; do
            [ -f "$chart/Chart.yaml" ] || continue
            echo "--- $chart ---"
            helm dependency build "$chart"
            helm template release "$chart" | kube-linter lint --config .kube-linter.yaml --format plain -
          done

  helm-diff:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: head

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Add helm repos
        run: |
          python3 -c "
          import yaml, glob
          repos = set()
          for pattern in ['base/charts/**/Chart.yaml', 'head/charts/**/Chart.yaml']:
              for f in glob.glob(pattern, recursive=True):
                  with open(f) as fh:
                      data = yaml.safe_load(fh)
                  for dep in (data or {}).get('dependencies', []):
                      repo = dep.get('repository', '')
                      if repo and not repo.startswith('oci://'):
                          repos.add(repo)
          for i, repo in enumerate(sorted(repos)):
              print(f'helm repo add repo-{i} {repo}')
          " | bash
          helm repo update
          mkdir -p ~/.docker && echo '{}' > ~/.docker/config.json

      - name: Render templates
        run: |
          mkdir -p /tmp/base /tmp/head
          for dir in base head; do
            for chart in $dir/charts/*/*; do
              [ -f "$chart/Chart.yaml" ] || continue
              name=$(basename "$chart")
              helm dependency build "$chart" 2>/dev/null || true
              helm template release "$chart" > /tmp/$dir/$name.yaml 2>/dev/null || true
            done
          done

      - name: Diff templates
        id: diff
        run: |
          output=$(diff -u --recursive --label base --label head /tmp/base /tmp/head 2>/dev/null || true)
          if [ -z "$output" ]; then
            output="No template changes detected."
          else
            output=$(echo "$output" | head -c 60000)
          fi
          {
            echo 'result<<DIFF_EOF'
            echo "$output"
            echo 'DIFF_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const result = process.env.DIFF_RESULT
            const noChanges = result.trim() === 'No template changes detected.'
            const body = noChanges
              ? '## Helm template diff\n\nNo template changes detected.'
              : '## Helm template diff\n\n```diff\n' + result + '\n```'
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })
        env:
          DIFF_RESULT: ${{ steps.diff.outputs.result }}
