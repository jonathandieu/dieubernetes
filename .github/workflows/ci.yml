name: CI
on:
  pull_request:
    paths:
      - 'charts/**'
      - 'argocd/**'
      - '.github/workflows/ci.yml'
      - '.github/actions/**'

jobs:
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/helm-setup

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/

      - name: Lint and validate charts
        run: |
          set -e
          for chart in charts/*/*; do
            [ -f "$chart/Chart.yaml" ] || continue
            echo "--- $chart ---"
            helm dependency build "$chart"
            helm lint "$chart"
            helm template release "$chart" \
              | kubeconform -strict \
                  -kubernetes-version 1.36.0 \
                  -schema-location default \
                  -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
                  -skip CustomResourceDefinition \
                  -summary
          done

  argocd-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/

      - name: Validate ArgoCD manifests
        run: |
          find argocd -name '*.yaml' | xargs kubeconform -strict \
            -kubernetes-version 1.36.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -skip CustomResourceDefinition \
            -summary

  helm-diff:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: head

      - uses: ./head/.github/actions/helm-setup

      - name: Render templates
        run: |
          mkdir -p /tmp/base /tmp/head
          for dir in base head; do
            for chart in $dir/charts/*/*; do
              [ -f "$chart/Chart.yaml" ] || continue
              name=$(basename "$chart")
              helm dependency build "$chart" 2>/dev/null || true
              helm template release "$chart" > /tmp/$dir/$name.yaml 2>/dev/null || true
            done
          done

      - name: Diff templates
        id: diff
        run: |
          output=$(diff -u --recursive --label base --label head /tmp/base /tmp/head 2>/dev/null || true)
          if [ -z "$output" ]; then
            output="No template changes detected."
          else
            output=$(echo "$output" | head -c 60000)
          fi
          {
            echo 'result<<DIFF_EOF'
            echo "$output"
            echo 'DIFF_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const result = process.env.DIFF_RESULT
            const noChanges = result.trim() === 'No template changes detected.'
            const body = noChanges
              ? '## Helm template diff\n\nNo template changes detected.'
              : '## Helm template diff\n\n```diff\n' + result + '\n```'
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })
        env:
          DIFF_RESULT: ${{ steps.diff.outputs.result }}
