gateway-helm:
  config:
    envoyGateway:
      gateway:
        controllerName: gateway.envoyproxy.io/gatewayclass-controller

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# gateway-helm only installs the controller and CRDs, not a GatewayClass or
# Gateway (see templates/gatewayclass.yaml and templates/gateway.yaml in
# this chart) - these are our own top-level values, not passed to the
# subchart.
gatewayClass:
  create: true
  name: envoy-gateway
  # DO load balancer ID is set per-cluster in
  # clusters/{name}/overrides/envoy-gateway.yaml so the pre-provisioned LB
  # is adopted rather than a new one being created. This has to go on an
  # EnvoyProxy resource (templates/envoyproxy.yaml) referenced via the
  # GatewayClass's parametersRef - the global EnvoyGateway config's
  # provider.kubernetes.envoyService.annotations (what used to be here)
  # is NOT applied to the per-Gateway Service at all, confirmed by
  # testing: it silently created a brand new, untracked load balancer
  # instead of adopting the real one on every cluster this was tried on.
  envoyServiceAnnotations: {}
  tls:
    # Single wildcard cert covers every app subdomain without needing a
    # new listener/cert per app. cert-manager's Gateway API support
    # (cert-manager.io/cluster-issuer annotation, requires
    # cert-manager's own config.enableGatewayAPI - set in
    # charts/infrastructure/cert-manager) derives the cert's dnsNames
    # from this hostname automatically.
    hostname: "*.dieu.dev"
    secretName: envoy-gateway-wildcard-tls
    clusterIssuer: selfsigned
