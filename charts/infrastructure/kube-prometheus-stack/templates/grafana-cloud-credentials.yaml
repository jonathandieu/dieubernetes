apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-cloud-credentials
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: grafana-cloud-credentials
  data:
    - secretKey: username
      remoteRef:
        key: Grafana Cloud - Prometheus Remote Write
        property: username
    - secretKey: password
      remoteRef:
        key: Grafana Cloud - Prometheus Remote Write
        property: password
