apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
spec:
  parentRefs:
    - name: public
      namespace: cilium-gateway-system
  hostnames:
    {{- toYaml .Values.httproute.hostnames | nindent 4 }}
  rules:
    - backendRefs:
        - name: {{ .Release.Name }}
          port: 9000
