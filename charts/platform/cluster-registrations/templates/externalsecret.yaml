{{- range .Values.clusters }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cluster-{{ .name }}
  namespace: {{ $.Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: cluster-{{ .name }}
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: cluster
          purpose: {{ .purpose | quote }}
      data:
        name: {{ .name | quote }}
        server: {{ .server | quote }}
        # config comes from 1Password via the fetch below. The line under
        # this comment renders as a literal double-curly-brace reference to
        # "config" in the manifest ArgoCD/Helm produces - that is ESO's own
        # template syntax, evaluated by the ESO controller at reconcile time
        # against the fetched secretKey below, not Helm's. Helm resolves
        # everything else in this file at render time; only this field
        # stays unresolved until ESO fetches the real value. Written here as
        # words, not literal braces, since Helm parses template actions in
        # comments too, not just in real values.
        config: {{ "{{ .config }}" | quote }}
  data:
    - secretKey: config
      remoteRef:
        key: {{ .onePasswordItem }}/config
{{- end }}
