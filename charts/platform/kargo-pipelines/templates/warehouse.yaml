{{- range .Values.apps }}
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
spec:
  interval: 5m0s
  subscriptions:
    - image:
        repoURL: {{ .imageRepo }}
        semverConstraint: ">=0.0.0"
        discoveryLimit: 5
{{- end }}
