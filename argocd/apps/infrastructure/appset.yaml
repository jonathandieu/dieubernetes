apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infrastructure
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - clusters: {}
          - list:
              elements:
                - app: kube-prometheus-stack
                  namespace: monitoring
                - app: metrics-server
                  namespace: kube-system
                - app: cert-manager
                  namespace: cert-manager
                - app: envoy-gateway
                  namespace: envoy-gateway-system
                - app: external-dns
                  namespace: external-dns
                - app: external-secrets
                  namespace: external-secrets
  template:
    metadata:
      name: "{{ .app }}-{{ .name }}"
    spec:
      project: default
      sources:
        # ref-only source: provides cluster-specific value overrides
        - repoURL: https://github.com/jonathandieu/dieubernetes
          targetRevision: HEAD
          ref: values
        # chart source: umbrella chart with base values + optional cluster override
        - repoURL: https://github.com/jonathandieu/dieubernetes
          targetRevision: HEAD
          path: "charts/infrastructure/{{ .app }}"
          helm:
            releaseName: "{{ .app }}"
            valueFiles:
              - values.yaml
              - "$values/clusters/{{ .name }}/overrides/{{ .app }}.yaml"
            ignoreMissingValueFiles: true
      destination:
        server: "{{ .server }}"
        namespace: "{{ .namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: -1
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 5m
